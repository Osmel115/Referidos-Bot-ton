<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>TON Referral Mini App</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; color: #333; margin: 0; padding: 10px; display: none; }
        .card { background: white; margin: 15px auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; }
        h1 { color: #0088cc; font-size: 2.5em; margin: 10px 0; }
        h2 { font-size: 1.1em; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .stat-value { color: #333; font-size: 1.8em; font-weight: bold; margin: 5px 0; }
        button { background: #0088cc; color: white; border: none; padding: 15px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1em; margin-top: 10px; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        input { width: 90%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; text-align: center; background: #f9f9f9; margin-top: 10px; font-size: 0.9em; color: #333; }
        .status { font-size: 0.8em; color: #888; margin-top: 10px; }
        .divider { border-top: 1px solid #eee; margin: 15px 0; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Mi Balance</h2>
        <h1 id="balance">0.000 TON</h1>
        
        <div class="divider"></div>
        
        <h2>Mis Referidos</h2>
        <div class="stat-value" id="referrals-count">0</div>
        
        <div class="divider"></div>
        
        <p>Mínimo de retiro: <strong>0.01 TON</strong></p>
        <button id="withdraw-btn" onclick="solicitarRetiro()" disabled>Retirar</button>
    </div>
    
    <div class="card">
        <h3>Invita y Gana</h3>
        <p>Gana 0.01 TON por cada amigo que se una.</p>
        <input type="text" id="ref-link" readonly onclick="copiarLink()">
        <p class="status" id="copy-status">Toca el link para copiarlo</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const SUPABASE_URL = 'https://zzjxfwsqrzzehzongdrd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_abzxh0zwKbNmcoXJ5kb12Q_pyv1YgY8';
        
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        async function cargarDatosUsuario() {
            const user = tg.initDataUnsafe.user;
            
            if (!user) {
                document.body.style.display = "block";
                document.body.innerHTML = `<div style="padding: 50px;"><h2>⚠️ ACCESO DENEGADO</h2><p>Abre la app desde el bot.</p></div>`;
                return;
            }

            document.body.style.display = "block";
            const userId = user.id;
            document.getElementById('ref-link').value = `https://t.me/ReferidosBotTon_bot?start=${userId}`;

            try {
                let { data: usuario } = await supabaseClient
                    .from('usuarios')
                    .select('balance')
                    .eq('id_telegram', userId)
                    .single();

                if (usuario) {
                    const balanceReal = parseFloat(usuario.balance) || 0;
                    document.getElementById('balance').innerText = balanceReal.toFixed(3) + " TON";
                    if (balanceReal >= 0.01) {
                        document.getElementById('withdraw-btn').disabled = false;
                    }
                }

                let { count, error: countError } = await supabaseClient
                    .from('usuarios')
                    .select('*', { count: 'exact', head: true })
                    .eq('referido_por', userId); 

                if (!countError) {
                    document.getElementById('referrals-count').innerText = count || 0;
                }
            } catch (err) { console.error(err); }
        }

        function copiarLink() {
            const copyText = document.getElementById("ref-link");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            document.getElementById('copy-status').innerText = "¡Copiado! ✅";
            setTimeout(() => { document.getElementById('copy-status').innerText = "Toca el link para copiarlo"; }, 2000);
        }

        // --- SOLUCIÓN PARA QUE NO SE QUEDE TRABADO ---
        async function solicitarRetiro() {
            const user = tg.initDataUnsafe.user;
            const balanceTexto = document.getElementById('balance').innerText;
            const balanceNumerico = parseFloat(balanceTexto);

            tg.showConfirm(`¿Confirmas el retiro automático de ${balanceTexto}?`, async (confirmado) => {
                if (confirmado) {
                    const btn = document.getElementById('withdraw-btn');
                    btn.disabled = true;
                    btn.innerText = "Procesando...";

                    try {
                        // Enviamos la petición directamente a tu API en Vercel
                        const response = await fetch('https://referidos-bot-ton.vercel.app/api/index', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                accion_manual: "retiro_directo",
                                id: user.id,
                                monto: balanceNumerico
                            })
                        });

                        if (response.ok) {
                            tg.showAlert("✅ ¡Retiro enviado! Revisa los mensajes de tu bot.");
                            setTimeout(() => tg.close(), 1500);
                        } else {
                            throw new Error("Error en servidor");
                        }
                    } catch (err) {
                        tg.showAlert("❌ Hubo un problema al conectar con el bot. Intenta de nuevo.");
                        btn.disabled = false;
                        btn.innerText = "Retirar";
                    }
                }
            });
        }

        cargarDatosUsuario();
    </script>
</body>
</html>
